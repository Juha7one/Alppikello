<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alppikello Run Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .run-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .content {
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .runner-info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .runner-info p {
            margin: 4px 0 0 0;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
        }

        .time-box {
            text-align: right;
        }

        .time-label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -2px;
        }

        .time-value {
            font-size: 40px;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            font-size: 18px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .btn-install {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-install:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .status-badge {
            background: var(--success);
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }

        .role-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 900;
            color: var(--accent);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .clock-overlay {
            position: absolute;
            bottom: 60px;
            left: 20px;
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            transition: opacity 0.3s;
            opacity: 0;
            z-index: 10;
        }

        .clock-val {
            font-size: 28px;
            font-weight: 900;
            font-family: monospace;
            line-height: 1.2;
        }

        .playlist-controls {
            position: absolute;
            top: 15px;
            left: 20px;
            display: flex;
            gap: 6px;
            z-index: 10;
        }

        .playlist-dot {
            width: 25px;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-dot.active {
            background: var(--accent);
            width: 35px;
        }
    </style>
</head>
<body>

    <div class="run-card">
        <div class="video-container" id="video-wrapper">
            <video id="run-video" playsinline style="display: none;"></video>
            
            <div id="video-placeholder" style="display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3; height: 100%;">
                <div style="font-size: 40px; margin-bottom: 10px;">🎬</div>
                <div style="font-size: 10px; font-weight: 900; letter-spacing: 2px; text-align: center; padding: 0 20px;">VIDEOA KÄSITELLÄÄN TAI SE PUUTTUU</div>
            </div>

            <div id="role-badge" class="role-badge" style="display: none;">VIDEO</div>
            
            <div id="clock-overlay" class="clock-overlay">
                <div style="font-size: 10px; font-weight: 900; color: var(--accent); letter-spacing: 1px; margin-bottom: 2px;" id="clock-name">LASKIJA</div>
                <div class="clock-val" id="clock-time">0.00</div>
            </div>

            <div id="playlist-dots" class="playlist-controls"></div>
        </div>

        <div class="content">
            <div class="status-badge" id="session-name">HARJOITUS</div>
            <div class="header">
                <div class="runner-info">
                    <h1 id="runner-name">LASKIJA</h1>
                    <p id="run-date">6. MAALISKUUTA 2026</p>
                </div>
                <div class="time-box">
                    <span class="time-label">LOPPUAIKA</span>
                    <div class="time-value" id="run-time">--.--</div>
                </div>
            </div>

            <div class="footer">
                <a href="/" class="logo">
                    <div class="logo-icon">A</div>
                    ALPPIKELLO
                </a>
                <a href="/" class="btn-install">LATAA SOVELLUS</a>
            </div>
        </div>
    </div>

    <script>
        // Data populated by server
        const runData = {{RUN_DATA}};
        let currentIndex = 0;
        let playlist = [];

        function formatDuration(ms) {
            const secs = (ms / 1000).toFixed(2);
            return secs;
        }

        if (runData) {
            document.getElementById('runner-name').innerText = runData.name.toUpperCase();
            document.getElementById('clock-name').innerText = runData.name.toUpperCase();
            
            const totalTimeRaw = typeof runData.totalTime === 'number' ? (runData.totalTime / 1000).toFixed(2) : runData.totalTime;
            document.getElementById('run-time').innerText = totalTimeRaw;
            
            document.getElementById('session-name').innerText = runData.sessionName.toUpperCase();
            document.getElementById('run-date').innerText = new Date(runData.timestamp).toLocaleDateString('fi-FI', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
            
            playlist = (runData.videos || []).sort((a, b) => (a.triggerTime || 0) - (b.triggerTime || 0));
            if (playlist.length === 0 && runData.videoUrl) {
                playlist = [{ url: runData.videoUrl, role: 'video', triggerTime: (runData.startTime || runData.timestamp) + (runData.totalTime || 0) }];
            }

            const video = document.getElementById('run-video');
            const placeholder = document.getElementById('video-placeholder');
            const badge = document.getElementById('role-badge');
            const clock = document.getElementById('clock-overlay');
            const clockTime = document.getElementById('clock-time');
            const dotsContainer = document.getElementById('playlist-dots');

            if (playlist.length > 0) {
                video.style.display = 'block';
                placeholder.style.display = 'none';
                badge.style.display = 'block';
                
                function loadClip(index) {
                    currentIndex = index;
                    const clip = playlist[index];
                    video.src = clip.url;
                    video.setAttribute('data-video-start-time', clip.videoStartTime || 0);
                    badge.innerText = (clip.role || 'VIDEO').toUpperCase();
                    
                    // Update dots
                    dotsContainer.innerHTML = playlist.map((_, i) => 
                        `<div class="playlist-dot ${i === index ? 'active' : ''}" onclick="loadClip(${i})"></div>`
                    ).join('');

                    video.play().catch(() => {});
                }

                video.ontimeupdate = () => {
                    const clip = playlist[currentIndex];
                    const vAbsStart = parseInt(video.getAttribute('data-video-start-time'));
                    const sTime = runData.startTime || runData.timestamp;
                    const officialTotalMs = runData.totalTime || 0;
                    
                    clock.style.opacity = '1';
                    
                    let raceTimeSec = 0;
                    if (vAbsStart && vAbsStart > 0 && sTime) {
                         const currentRaceMs = (vAbsStart + video.currentTime * 1000) - sTime;
                         raceTimeSec = Math.max(0, currentRaceMs / 1000);
                    } else {
                        // Legacy fallback
                        const triggerTime = clip.triggerTime || sTime;
                        const clipRelRace = (triggerTime - sTime) - 2000;
                        const currentRaceTimeMs = clipRelRace + (video.currentTime * 1000);
                        raceTimeSec = Math.max(0, (currentRaceTimeMs / 1000));
                    }

                    // CLIPPING: Never show more than final race time if we have it
                    if (officialTotalMs > 0) {
                        raceTimeSec = Math.min(raceTimeSec, officialTotalMs / 1000);
                    }
                    clockTime.innerText = raceTimeSec.toFixed(2);
                };

                video.onended = () => {
                    if (currentIndex < playlist.length - 1) {
                        loadClip(currentIndex + 1);
                    } else {
                        clock.style.opacity = '0.5';
                    }
                };

                video.onpause = () => { clock.style.opacity = '0.5'; };
                video.onplay = () => { clock.style.opacity = '1'; };

                loadClip(0);
                window.loadClip = loadClip;
            } else {
                video.style.display = 'none';
                placeholder.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
