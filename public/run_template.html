<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alppikello Run Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .run-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .content {
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .runner-info h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .runner-info p {
            margin: 4px 0 0 0;
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
        }

        .time-box {
            text-align: right;
        }

        .time-label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -2px;
        }

        .time-value {
            font-size: 40px;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            font-size: 18px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .btn-install {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-install:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .status-badge {
            background: var(--success);
            color: #000;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="run-card">
        <div class="video-container" id="video-wrapper" style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <video id="run-video" controls poster="/img/video-poster.jpg" style="display: none;">
                <source id="video-source" src="" type="video/mp4">
                Selaimesi ei tue videotoistoa.
            </video>
            <div id="video-placeholder" style="display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.3;">
                <div style="font-size: 40px; margin-bottom: 10px;">🎬</div>
                <div style="font-size: 12px; font-weight: 900; letter-spacing: 2px;">VIDEOA KÄSITELLÄÄN TAI SE PUUTTUU</div>
            </div>
        </div>

        <div class="content">
            <div class="status-badge" id="session-name">HARJOITUS</div>
            <div class="header">
                <div class="runner-info">
                    <h1 id="runner-name">LASKIJA</h1>
                    <p id="run-date">6. MAALISKUUTA 2026</p>
                </div>
                <div class="time-box">
                    <span class="time-label">LOPPUAIKA</span>
                    <div class="time-value" id="run-time">--.--</div>
                </div>
            </div>

            <div class="footer">
                <a href="/" class="logo">
                    <div class="logo-icon">A</div>
                    ALPPIKELLO
                </a>
                <a href="/" class="btn-install">LATAA SOVELLUS</a>
            </div>
        </div>
    </div>

    <script>
        // Data populated by server
        const runData = {{RUN_DATA}};

        if (runData) {
            document.getElementById('runner-name').innerText = runData.name.toUpperCase();
            document.getElementById('run-time').innerText = runData.totalTime;
            document.getElementById('session-name').innerText = runData.sessionName.toUpperCase();
            document.getElementById('run-date').innerText = new Date(runData.timestamp).toLocaleDateString('fi-FI', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();
            
            if (runData.videoUrl) {
                document.getElementById('video-source').src = runData.videoUrl;
                document.getElementById('run-video').style.display = 'block';
                document.getElementById('video-placeholder').style.display = 'none';
                document.getElementById('run-video').load();
            } else {
                document.getElementById('run-video').style.display = 'none';
                document.getElementById('video-placeholder').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
