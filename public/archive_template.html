<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alppikello - Harjoituksen Tulokset</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .header p {
            color: var(--text-muted);
            font-weight: 700;
            font-size: 14px;
            margin-top: 8px;
        }

        .run-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .content {
            padding: 20px;
        }

        .run-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .runner-name {
            font-size: 20px;
            font-weight: 900;
            text-transform: uppercase;
            margin: 0;
        }

        .run-time {
            font-size: 24px;
            font-weight: 900;
            font-family: monospace;
            color: var(--accent);
        }

        .splits-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .split-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .split-label {
            font-weight: 700;
            opacity: 0.5;
        }

        .split-val {
            font-weight: 900;
        }

        .clock-overlay {
            position: absolute;
            bottom: 15px;
            right: 15px;
            pointer-events: none;
            background: rgba(0,0,0,0.8);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            transition: opacity 0.3s;
            opacity: 0;
            text-align: right;
            z-index: 10;
        }

        .clock-val {
            font-size: 16px;
            font-weight: 900;
            font-family: monospace;
            line-height: 1;
            color: #fff;
        }

        .footer {
            margin-top: 50px;
            margin-bottom: 40px;
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 900;
            font-size: 18px;
            text-decoration: none;
            color: var(--text);
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .btn-install {
            display: block;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-install:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .rank-badge {
            font-size: 10px;
            opacity: 0.3;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 id="session-name">HARJOITUS</h1>
            <p id="session-date">PÄIVÄMÄÄRÄ</p>
        </div>

        <div id="results-list"></div>

        <div class="footer">
            <a href="/" class="logo">
                <div class="logo-icon">A</div>
                ALPPIKELLO
            </a>
            <a href="/" class="btn-install">LATAA SOVELLUS JA ALOITA AJANOTTO</a>
        </div>
    </div>

    <script>
        const session = {{SESSION_DATA}};

        function formatDuration(ms) {
            if (ms === undefined || ms === null || isNaN(ms)) return "--,--";
            if (ms === 0) return "--,--";
            const absoluteMs = Math.abs(ms);
            const centis = Math.floor((absoluteMs % 1000) / 10);
            const totalSecs = Math.floor(absoluteMs / 1000);
            const hours = Math.floor(totalSecs / 3600);
            const mins = Math.floor((totalSecs % 3600) / 60);
            const secs = totalSecs % 60;

            const cStr = String(centis).padStart(2, '0');
            const sStr = String(secs).padStart(2, '0');
            const mStr = String(mins).padStart(2, '0');

            let out = "";
            if (hours > 0) {
                out = `${hours}.${mStr}.${sStr},${cStr}`;
            } else if (mins > 0) {
                out = `${mins}.${sStr},${cStr}`;
            } else {
                out = `${secs},${cStr}`;
            }
            return (ms < 0 ? "-" : "") + out;
        }

        if (session) {
            document.title = `Alppikello - ${session.name}`;
            document.getElementById('session-name').innerText = session.name.toUpperCase();
            const date = new Date(session.archivedAt || session.timestamp);
            document.getElementById('session-date').innerText = date.toLocaleDateString('fi-FI', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase();

            const listEl = document.getElementById('results-list');
            
            listEl.innerHTML = session.results.map((r, i) => {
                const splitsHtml = (r.splits || []).map((s, idx) => `
                    <div class="split-item">
                        <span class="split-label">VÄLIAIKA ${idx + 1}</span>
                        <span class="split-val">${formatDuration(s.duration)} s</span>
                    </div>
                `).join('');

                return `
                    <div class="run-card" style="animation-delay: ${i * 0.1}s">
                        <div class="video-container">
                            ${r.videoUrl ? `
                                <video id="vid-${r.runId}" src="${r.videoUrl}" playsinline controls></video>
                                <div id="clock-${r.runId}" class="clock-overlay">
                                    <div style="font-size: 8px; font-weight: 900; color: var(--accent); letter-spacing: 0.5px; line-height: 1; text-transform: uppercase; margin-bottom: 2px;">${r.name.toUpperCase()}</div>
                                    <div class="clock-val">0,00</div>
                                </div>
                            ` : `
                                <div style="height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.2;">
                                    <div style="font-size: 32px; margin-bottom: 8px;">🎬</div>
                                    <div style="font-size: 10px; font-weight: 900;">VIDEOA EI SAATAVILLA</div>
                                </div>
                            `}
                        </div>
                        <div class="content">
                            <div class="run-header">
                                <div>
                                    <span class="rank-badge">#${session.results.length - i}</span>
                                    <h2 class="runner-name">${r.name.toUpperCase()}</h2>
                                </div>
                                <div class="run-time">${formatDuration(r.totalTime)}</div>
                            </div>
                            ${splitsHtml ? `<div class="splits-list">${splitsHtml}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            // Clock Logic
            session.results.forEach(r => {
                const vEl = document.getElementById(`vid-${r.runId}`);
                const vClock = document.getElementById(`clock-${r.runId}`);
                if (vEl && vClock) {
                    const clockVal = vClock.querySelector('.clock-val');
                    vEl.ontimeupdate = () => {
                        vClock.style.opacity = '1';
                        const displayMs = Math.min(vEl.currentTime * 1000, r.totalTime || 999999);
                        clockVal.innerText = (displayMs / 1000).toFixed(2).replace('.', ',');
                    };
                    vEl.onpause = () => { vClock.style.opacity = '0.5'; };
                    vEl.onplay = () => { vClock.style.opacity = '1'; };
                }
            });
        }
    </script>
</body>
</html>
